<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Katibeh&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Portfolio</title>
</head>
<body>
    <header>
        <nav>
            <h1>Portfolio</h1>
            <button id="lang-toggle">EN</button>
            <button id="theme-toggle">Toggle Dark Mode</button>
        </nav>
    </header>
    <main>
        <section id="home">
            <h2>HOME</h2>
            <p>Welcome to my portfolio!</p>
        </section>
        <section id="about">
            <h2>ABOUT ME</h2>
            <div id="timeline">
                <!-- Interactive Timeline for 2002–2025 -->
            </div>
        </section>
        <section id="thesis">
            <h2>THESIS WORK</h2>
            <div id="phases">
                <!-- Phases of Thesis Work -->
            </div>
        </section>
        <section id="animation">
            <h2>3D ANIMATION</h2>
            <div id="reel">
                <!-- Reel Placeholder -->
            </div>
            <div id="galleries">
                <!-- Categorized Galleries: Stepped, Spline, Polish -->
            </div>
        </section>
        <section id="visual-development">
            <h2>VISUAL DEVELOPMENT</h2>
            <div class="projects">
                <!-- Projects with Interactive Modal -->
            </div>
        </section>
        <section id="storyboard">
            <h2>STORYBOARD</h2>
            <p>Coming Soon</p>
        </section>
        <section id="personal-work">
            <h2>PERSONAL WORK</h2>
            <p>My creative explorations.</p>
        </section>
        <section id="contact">
            <h2>CONTACT</h2>
            <form id="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" required>
                <label for="message">Message:</label>
                <textarea id="message" required></textarea>
                <button type="submit">Send</button>
            </form>
        </section>
    </main>
    <footer>
        <div class="social-buttons">
            <!-- Social Buttons with Platform Gradients -->
        </div>
    </footer>
    <script src="app.js"></script>
</body>
</html>
