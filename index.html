<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Katibeh&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />

  <title>Carla Escrig Durán — Portfolio</title>
</head>

<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header>
    <nav>
      <div class="brand">
        <h1>Portfolio</h1>
        <small>3D animator & Visual Development artist</small>
      </div>

      <div class="nav-actions">
        <button id="lang-toggle" class="btn" type="button" aria-label="Toggle language">EN</button>
        <button id="theme-toggle" class="btn btn--ghost" type="button" aria-label="Toggle dark mode">Dark</button>
      </div>
    </nav>
  </header>

  <main id="main">
    <section id="home" class="section">
      <h2>HOME</h2>
      <p>Welcome to my portfolio!</p>
      <!-- app.js injects the hero block here -->
    </section>

    <section id="about" class="section">
      <h2>ABOUT ME</h2>
      <div id="timeline"></div>
    </section>

    <section id="thesis" class="section">
      <h2>THESIS WORK</h2>
      <div id="phases"></div>
    </section>

    <section id="animation" class="section">
      <h2>3D ANIMATION</h2>
      <div id="reel"></div>
      <div id="galleries"></div>
    </section>

    <section id="visual-development" class="section">
      <h2>VISUAL DEVELOPMENT</h2>
      <div class="projects">
        <!-- future: projects + modals -->
      </div>
    </section>

    <section id="storyboard" class="section">
      <h2>STORYBOARD</h2>
      <p>Coming Soon</p>
    </section>

    <section id="personal-work" class="section">
      <h2>PERSONAL WORK</h2>
      <p>My creative explorations.</p>
    </section>

    <section id="contact" class="section">
      <h2>CONTACT</h2>

      <form id="contact-form">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" autocomplete="name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" autocomplete="email" required />

        <label for="message">Message:</label>
        <textarea id="message" name="message" required></textarea>

        <button class="btn" type="submit">Send</button>
      </form>

      <!-- app.js injects social buttons + mailto here -->
    </section>
  </main>

  <footer></footer>

  <script src="app.js"></script>
</body>
</html>
